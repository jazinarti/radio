<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>راديو أرض السعودية | البث المباشر</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    
    <style>
        :root {
            --primary-color: #00e676;
            --primary-glow: rgba(0, 230, 118, 0.4);
            --bg-gradient: linear-gradient(135deg, #0d1b15 0%, #070f0b 100%);
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background: var(--bg-gradient);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* الكرت الرئيسي */
        .player-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
            width: 90%;
            max-width: 380px;
            text-align: center;
            position: relative;
            transition: transform 0.3s ease;
        }

        .player-card:hover {
            transform: translateY(-5px);
        }

        /* صورة/أيقونة الراديو الفخمة */
        .logo-area {
            width: 140px;
            height: 140px;
            background: linear-gradient(135deg, #11291f 0%, #08140f 100%);
            border: 2px solid var(--card-border);
            border-radius: 50%;
            margin: 0 auto 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            position: relative;
        }

        .logo-area i {
            font-size: 55px;
            color: var(--primary-color);
            text-shadow: 0 0 15px var(--primary-glow);
        }

        /* النصوص */
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            background: linear-gradient(to left, #ffffff, #a3b8cc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-text {
            font-size: 14px;
            color: #8899a6;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #ff3d00;
            border-radius: 50%;
        }

        /* تموجات الصوت المتحركة */
        .wave-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
            height: 30px;
            margin-bottom: 35px;
        }

        .wave-bar {
            width: 4px;
            height: 5px;
            background-color: var(--primary-color);
            border-radius: 2px;
            transition: height 0.2s ease;
        }

        /* حركة الأمواج عند التشغيل */
        .playing .wave-bar {
            animation: pulse 1.2s ease-in-out infinite alternate;
        }
        .playing .wave-bar:nth-child(2) { animation-delay: 0.2s; }
        .playing .wave-bar:nth-child(3) { animation-delay: 0.4s; }
        .playing .wave-bar:nth-child(4) { animation-delay: 0.6s; }
        .playing .wave-bar:nth-child(5) { animation-delay: 0.3s; }

        @keyframes pulse {
            0% { height: 5px; }
            100% { height: 30px; cubic-bezier(0.45, 0.05, 0.55, 0.95) }
        }

        /* أزرار التحكم الدائرية المخصصة */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
        }

        .btn-play {
            width: 80px;
            height: 80px;
            background: var(--primary-color);
            border: none;
            border-radius: 50%;
            color: #000000;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 25px var(--primary-glow);
            transition: all 0.3s ease;
        }

        .btn-play:hover {
            transform: scale(1.08);
            box-shadow: 0 10px 30px var(--primary-color);
        }

        .btn-play:active {
            transform: scale(0.95);
        }

        /* إخفاء مشغل فيديو جي إس الافتراضي للحفاظ على التصميم المخصص */
        .video-js {
            display: none !important;
        }
    </style>
</head>
<body>

<div class="player-card" id="card">
    <div class="logo-area">
        <i class="fa-solid fa-radio"></i>
    </div>
    
    <h1>راديو أرض السعودية</h1>
    
    <div class="status-text">
        <div class="status-dot" id="dot"></div>
        <span id="status-label">مظفأ</span>
    </div>

    <div class="wave-container" id="wave-box">
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
    </div>
    
    <div class="controls">
        <button class="btn-play" id="play-trigger" onclick="togglePlayback()">
            <i class="fa-solid fa-play" id="icon-state" style="margin-right: 4px;"></i>
        </button>
    </div>

    <audio id="my-audio" class="video-js" preload="auto">
        <source src="https://saudiearth.com/radio/radio.m3u" type="application/x-mpegURL">
    </audio>
</div>

<script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
<script>
    var player = videojs('my-audio');
    var isPlaying = false;

    var playTrigger = document.getElementById('play-trigger');
    var iconState = document.getElementById('icon-state');
    var waveBox = document.getElementById('wave-box');
    var dot = document.getElementById('dot');
    var statusLabel = document.getElementById('status-label');

    function togglePlayback() {
        if (!isPlaying) {
            player.play();
            isPlaying = true;
            iconState.className = "fa-solid fa-pause";
            iconState.style.marginRight = "0px";
            waveBox.classList.add('playing');
            dot.style.backgroundColor = "#00e676";
            dot.style.boxShadow = "0 0 10px #00e676";
            statusLabel.innerText = "بث مباشر آمن المظهر";
        } else {
            player.pause();
            isPlaying = false;
            iconState.className = "fa-solid fa-play";
            iconState.style.marginRight = "4px";
            waveBox.classList.remove('playing');
            dot.style.backgroundColor = "#ff3d00";
            dot.style.boxShadow = "none";
            statusLabel.innerText = "مطفأ";
        }
    }
</script>

</body>
</html>
