<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>راديو أرض السعودية</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 400px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #00e676;
        }
        .video-js {
            margin: 0 auto;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>راديو أرض السعودية 📻</h1>
    <p>البث المباشر</p>
    
    <audio id="my-audio" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" width="300" height="60">
        <source src="https://saudiearth.com/radio/radio.m3u" type="application/x-mpegURL">
    </audio>
</div>

<script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
<script>
    var player = videojs('my-audio');
</script>

</body>
</html>
